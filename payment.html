<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --primary-green: #2d5a1b;
            --bg-gray: #f7f8f3;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-gray); 
            padding: 70px 0 100px; 
        }

        /* Header nempel di atas */
        .header { 
            background: white; 
            padding: 15px; 
            display: flex; 
            align-items: center; 
            border-bottom: 1px solid #eee;
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
            box-sizing: border-box;
        }

        .section-title { padding: 15px 18px 5px; font-size: 11px; font-weight: bold; color: #999; text-transform: uppercase; }
        
        /* PAKET */
        .plan-container { 
            display: flex; 
            gap: 8px; 
            padding: 10px 18px; 
            justify-content: space-between;
        }
        .plan-card {
            flex: 1;
            background: white;
            padding: 10px 5px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid #eee;
            cursor: pointer;
        }
        .plan-card.active { border-color: var(--primary-green); background: #f0f7ed; }
        .plan-card h4 { margin: 0; font-size: 10px; }
        .plan-card p { margin: 2px 0 0; font-size: 11px; font-weight: bold; color: var(--primary-green); }

        /* LIST METODE */
        .method-list { background: white; margin: 0 18px 15px; border-radius: 15px; border: 1px solid #eee; overflow: hidden; }
        .method-item { padding: 12px 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f9f9f9; font-size: 12px; }

        /* TOMBOL BAYAR */
        .bottom-action {
            position: fixed;
            bottom: 0; 
            left: 0;
            width: 100%;
            background: white;
            padding: 25px 20px;
            box-shadow: 0 -3px 10px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000; 
            box-sizing: border-box;
            border-top: 1px solid #eee;
        }

        .pay-btn {
            background: var(--primary-green);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            border: none;
            font-size: 13px;
        }

        /* Overlay Berhasil */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none; justify-content: center; align-items: center; z-index: 9999;
        }
        .popup { background: white; padding: 25px; border-radius: 20px; text-align: center; width: 75%; }

        /* Lingkaran Bullet di sebelah kanan */
        .radio-circle {
            width: 18px;
            height: 18px;
            border: 2px solid #ddd;
            border-radius: 50%;
            margin-left: auto; /* Memaksa ke sisi kanan */
            position: relative;
            transition: 0.2s;
        }

        /* Tampilan saat item dipilih */
        .method-item.active {
            background: #f0f7ed; /* Warna hijau muda lembut */
        }

        .method-item.active .radio-circle {
            border-color: var(--primary-green);
        }

        /* Titik di dalam bullet saat aktif */
        .method-item.active .radio-circle::after {
            content: '';
            width: 10px;
            height: 10px;
            background: var(--primary-green);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div class="header">
        <span onclick="history.back()" style="cursor:pointer; margin-right: 15px;">⬅️</span>
        <b style="color:var(--primary-green)">Pembayaran Premium</b>
    </div>

    <div class="section-title">Pilih Paket</div>
    <div class="plan-container">
        <div class="plan-card active" onclick="selectPlan('1 Bulan', 20000, this)">
            <h4>1 Bulan</h4>
            <p>Rp 20rb</p>
        </div>
        <div class="plan-card" onclick="selectPlan('3 Bulan', 50000, this)">
            <h4>3 Bulan</h4>
            <p>Rp 50rb</p>
        </div>
        <div class="plan-card" onclick="selectPlan('1 Tahun', 80000, this)">
            <h4>1 Tahun</h4>
            <p>Rp 80rb</p>
        </div>
    </div>

    <!-- Pilihan Pembayaran -->
    <div class="section-title">E-Wallet & QRIS</div>
        <div class="method-list">
            <div class="method-item active" onclick="selectMethod(this)">
                <span>📱</span> <span>ShopeePay / Dana / GoPay</span>
                <div class="radio-circle"></div>
            </div>
            <div class="method-item" onclick="selectMethod(this)">
                <span>🖼️</span> <span>QRIS (Scan Barcode)</span>
                <div class="radio-circle"></div>
            </div>
     </div>

    <div class="section-title">Transfer Bank</div>
        <div class="method-list">
        <div class="method-item" onclick="selectMethod(this)">
            <span>🏦</span> <span>Bank BCA</span>
            <div class="radio-circle"></div>
        </div>
        <div class="method-item" onclick="selectMethod(this)">
            <span>🏢</span> <span>Bank Mandiri</span>
            <div class="radio-circle"></div>
        </div>
        <div class="method-item" onclick="selectMethod(this)">
            <span>🏧</span> <span>Bank BRI</span>
            <div class="radio-circle"></div>
        </div>
    </div>

    <!-- Tombol yang menempel di bawah -->
    <div class="bottom-action">
        <div>
            <p id="p-text" style="margin:0; font-size:10px; color:#888;">Paket 1 Bulan</p>
            <b id="p-price" style="color:var(--primary-green); font-size:16px;">Rp 20.000</b>
        </div>
        <button class="pay-btn" onclick="showSuccess()">Bayar Sekarang</button>
    </div>

    <div class="overlay" id="ovl">
        <div class="popup">
            <h2 style="color:var(--primary-green); margin:0;">Berhasil! ✅</h2>
            <p style="font-size:12px; color:#666;">Akun Premium aktif.</p>
            <button onclick="location.href='beranda.html'" style="background:var(--primary-green); color:white; border:none; padding:10px 20px; border-radius:8px; width:100%; font-weight:bold;">Mulai Masak</button>
        </div>
    </div>

    <script>
        function selectPlan(n, p, el) {
            document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('p-text').innerText = 'Paket ' + n;
            document.getElementById('p-price').innerText = 'Rp ' + p.toLocaleString('id-ID');
        }
        function showSuccess() { document.getElementById('ovl').style.display = 'flex'; }

        function selectMethod(el) {
        // Hilangkan tanda aktif dari semua metode
        document.querySelectorAll('.method-item').forEach(item => {
            item.classList.remove('active');
        });
        // Tambahkan tanda aktif ke metode yang diklik
        el.classList.add('active');
    }
    </script>

</body>
</html>
