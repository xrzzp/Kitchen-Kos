<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kitchen Kos - Container</title>
    <style>
        :root { --primary-green: #2d5a1b; --bg-gray: #f7f8f3; --gold-premium: #d4af37; }
        body { margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; background: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
        .phone { width: 350px; height: 700px; background: var(--bg-gray); border-radius: 35px; border: 10px solid #333; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .sbar { height: 30px; background: #fff; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; font-size: 11px; font-weight: bold; }
        .phone-body { flex: 1; border: none; width: 100%; }
        .bnav {
            display: flex;
            justify-content: space-around; /* Mendistribusikan menu secara merata */
            align-items: flex-end; /* Memastikan teks sejajar di bawah */
            padding: 10px 5px;
            background: #fff;
            border-top: 1px solid #eee;
            position: relative;
        }

        .bnav-i {
            flex: 1; /* Memberikan ruang yang sama untuk setiap menu */
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
            gap: 4px; /* Jarak antara ikon dan teks */
        }

        .scan-circle {
            width: 50px;
            height: 50px;
            background: #2d5a1b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -30px; /* Membuat ikon scan menonjol ke atas */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 4px solid #fff; /* Memberikan bingkai putih agar rapi */
        }
    </style>
</head>

<body>
<div class="phone">
    <div class="sbar"><span>9:41</span><span>🔋</span></div>
    
    <!-- IFRAME: Tempat Konten Muncul -->
    <iframe id="layar-aplikasi" src="beranda.html" class="phone-body"></iframe>

<div class="bnav">
    <!-- Menu Beranda -->
    <div class="bnav-i" onclick="goTo('beranda.html', this)">
        <span style="font-size: 20px;">🏠</span>
        <span style="font-size: 10px; color: #888;">Beranda</span>
    </div>

    <!-- Menu Resep -->
    <div class="bnav-i" onclick="goTo('resep.html', this)">
        <span style="font-size: 20px;">📖</span>
        <span style="font-size: 10px; color: #888;">Resep</span>
    </div>

    <!-- Tombol Scan Tengah -->
    <div class="bnav-i" onclick="goTo('camera.html', this)">
        <div class="scan-circle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
            </svg>
        </div>
        <span style="font-size: 10px; color: #888;">Scan</span>
    </div>

    <!-- Menu Premium -->
    <div class="bnav-i" onclick="goTo('premium.html', this)">
        <span style="font-size: 20px; color: #bf953f;">⭐</span>
        <span style="font-size: 10px; color: #bf953f;">Premium</span>
    </div>

    <!-- Menu Profil -->
    <div class="bnav-i" onclick="goTo('profil.html', this)">
        <span style="font-size: 20px;">👤</span>
        <span style="font-size: 10px; color: #888;">Profil</span>
    </div>
</div>
    

<script>
    function goTo(namaFile, element) {
        const iframe = document.getElementById('layar-aplikasi');
        if (iframe) {
            iframe.src = namaFile;
        }

        const navItems = document.querySelectorAll('.bnav-i');
        navItems.forEach(item => item.classList.remove('active'));
        element.classList.add('active');
    }
</script>


</body>
</html>
