<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kitchen Kos - Container</title>
    <style>
        :root { --primary-green: #2d5a1b; --bg-gray: #f7f8f3; }
        body { margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; background: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
        
        .phone { 
            width: 350px; height: 700px; background: var(--bg-gray); 
            border-radius: 35px; border: 10px solid #333; 
            position: relative; overflow: hidden; display: flex; flex-direction: column; 
        }
        
        .sbar { height: 30px; background: #fff; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; font-size: 11px; font-weight: bold; }
        .phone-body { flex: 1; border: none; width: 100%; }
        
        /* Menu disembunyikan di awal */
        .bnav {
            display: none; 
            justify-content: space-around;
            align-items: flex-end;
            padding: 10px 5px;
            background: #fff;
            border-top: 1px solid #eee;
        }

        .bnav-i { flex: 1; display: flex; flex-direction: column; align-items: center; cursor: pointer; gap: 4px; text-decoration: none; }
        
        .scan-circle { 
            width: 50px; height: 50px; background: var(--primary-green); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            margin-top: -30px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 4px solid #fff; 
        }
    </style>
</head>
<body>

<div class="phone">
    <div class="sbar"><span>9:41</span><span>🔋</span></div>
    
    <!-- Memuat Login terlebih dahulu -->
    <iframe id="layar-aplikasi" src="login.html" class="phone-body"></iframe>

    <div class="bnav" id="menu-bawah">
        <div class="bnav-i" onclick="goTo('beranda.html')">
            <span style="font-size: 20px;">🏠</span>
            <span style="font-size: 10px; color: #888;">Beranda</span>
        </div>
        <div class="bnav-i" onclick="goTo('resep.html')">
            <span style="font-size: 20px;">📖</span>
            <span style="font-size: 10px; color: #888;">Resep</span>
        </div>
        <div class="bnav-i" onclick="goTo('camera.html')">
            <div class="scan-circle">📸</div>
            <span style="font-size: 10px; color: #888;">Scan</span>
        </div>
        <div class="bnav-i" onclick="goTo('premium.html')">
            <span style="font-size: 20px; color: #bf953f;">⭐</span>
            <span style="font-size: 10px; color: #bf953f;">Premium</span>
        </div>
        <div class="bnav-i" onclick="goTo('profil.html')">
            <span style="font-size: 20px;">👤</span>
            <span style="font-size: 10px; color: #888;">Profil</span>
        </div>
    </div>
</div>

<script>
    function goTo(namaFile) {
        document.getElementById('layar-aplikasi').src = namaFile;
    }

    // Mendengarkan sinyal masuk-ke-beranda dari login.html
    window.addEventListener('message', function(event) {
        if (event.data === 'masuk-ke-beranda') {
            document.getElementById('layar-aplikasi').src = 'beranda.html'; 
            document.getElementById('menu-bawah').style.display = 'flex'; // Memunculkan menu[cite: 5, 6]
        }
    });
</script>

</body>
</html>
